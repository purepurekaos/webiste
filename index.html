<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TLR</title>
<style>
body{
    background:#000;
    color:#fff;
    font-family: "Courier New", monospace;
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}
.container{
    text-align:center;
}
.menu{
    text-align:center;
    display:inline-block;
}
.menu-item{
    margin:18px 0;
    overflow:hidden;
}
.menu-item a{
    display:block;
    color:white;
    text-decoration:none;
    font-size:14px;
}
.menu-item a:hover{
    text-decoration:underline;
}
.popup{
    max-height:0;
    overflow:hidden;
    transition: max-height 0.3s ease, padding 0.3s ease;
    font-size:12px;
    color:#aaa;
    text-align:center;
    padding:0;
    line-height:1.6;
}
.menu-item:hover .popup{
    max-height:100px;
    padding:8px 0;
}
.socials{
    margin-top:40px;
    text-align:center;
}
.socials a{
    color:#888;
    text-decoration:none;
    margin:0 8px;
}
.socials a:hover{
    color:#fff;
}
.time{
    font-size:13px;
    margin-top:40px;
    color:#888;
}
</style>
</head>
<body>
<div class="container">
    <div class="menu">
        <div class="menu-item">
            <a href="#">about me</a>
            <div class="popup">A little bit about who I am and what I do.</div>
        </div>
        <div class="menu-item">
            <a href="#">Qualifications</a>
            <div class="popup">My education, certifications, and experience.</div>
        </div>
        <div class="menu-item">
            <a href="#">Interests</a>
            <div class="popup">Things I'm passionate about outside of work.</div>
        </div>
        <div class="menu-item">
            <a href="#">contact</a>
            <div class="popup">Get in touch — always open to new opportunities.</div>
        </div>
    </div>
    <div class="socials">
        <a href="https://www.instagram.com/lourt101?igsh=aTJmeDdqdmU2MHFj&utm_source=qr" target="_blank">instagram</a>
        <a href="https://open.spotify.com/user/psvd7bljlz388mt36t0lz5l6i?si=45927fe03a7547ab" target="_blank">spotify</a>
        <a href="https://github.com/purepurekaos" target="_blank">github</a>
    </div>
    <div class="time" id="clock"></div>
</div>
<script>
function updateClock(){
    const now = new Date();
    document.getElementById('clock').textContent =
        now.toLocaleDateString() + " " +
        now.toLocaleTimeString() + " GMT";
}
updateClock();
setInterval(updateClock,1000);
</script>
</body>
</html>
