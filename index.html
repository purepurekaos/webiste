<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TLR</title>

<style>
body{
    background:#000;
    color:#fff;
    font-family: "Courier New", monospace;
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    text-align:center;
}

.logo{
    display:inline-block;
    background:#fff;
    color:#000;
    padding:10px 25px;
    font-size:38px;
    font-weight:bold;
    margin-bottom:15px;
    letter-spacing:2px;
}

.time{
    font-size:13px;
    margin-bottom:120px;
}

.menu{
    text-align:left;
    display:inline-block;
}

.menu a{
    display:block;
    color:white;
    text-decoration:none;
    margin:18px 0;
    font-size:14px;
}

.menu a:hover{
    text-decoration:underline;
}

.socials{
    margin-top:40px;
    text-align:center;
}

.socials a{
    color:#888;
    text-decoration:none;
    margin:0 8px;
}
</style>
</head>
<body>

<div class="container">

    <div class="logo">TLR</div>

    <div class="time" id="clock"></div>

    <div class="menu">
        <a href="#">news</a>
        <a href="#">summer 2026 collection</a>
        <a href="#">lookbook</a>
        <a href="#">archive</a>
        <a href="#">about</a>
        <a href="#">store</a>
        <a href="#">contact</a>
        <a href="#">mailing list</a>
    </div>

    <div class="socials">
        <a href="#">instagram</a>
        <a href="#">youtube</a>
        <a href="#">spotify</a>
    </div>

</div>

<script>
function updateClock(){
    const now = new Date();
    document.getElementById('clock').textContent =
        now.toLocaleDateString() + " " +
        now.toLocaleTimeString() + " GMT";
}
updateClock();
setInterval(updateClock,1000);
</script>

</body>
</html>
