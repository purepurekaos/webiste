<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TLR</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}
body{
    color:#fff;
    font-family: "Courier New", monospace;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    overflow:hidden;
}
canvas{
    position:fixed;
    top:0;
    left:0;
    z-index:0;
}
.container{
    text-align:center;
    position:relative;
    z-index:1;
}
.menu{
    text-align:center;
    display:inline-block;
}
.menu-item{
    margin:18px 0;
    overflow:hidden;
}
.menu-item a{
    display:block;
    color:white;
    text-decoration:none;
    font-size:14px;
}
.menu-item a:hover{
    text-decoration:underline;
}
.popup{
    max-height:0;
    overflow:hidden;
    transition: max-height 0.3s ease, padding 0.3s ease;
    font-size:12px;
    color:#aaa;
    text-align:center;
    padding:0;
    line-height:1.6;
}
.menu-item:hover .popup{
    max-height:100px;
    padding:8px 0;
}
.socials{
    margin-top:40px;
    text-align:center;
}
.socials a{
    color:#888;
    text-decoration:none;
    margin:0 8px;
}
.socials a:hover{
    color:#fff;
}
.time{
    font-size:13px;
    margin-top:40px;
    color:#888;
}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="container">
    <div class="menu">
        <div class="menu-item">
            <a href="#">about me</a>
            <div class="popup">A little bit about who I am and what I do.</div>
        </div>
        <div class="menu-item">
            <a href="#">Qualifications</a>
            <div class="popup">My education, certifications, and experience.</div>
        </div>
        <div class="menu-item">
            <a href="#">Interests</a>
            <div class="popup">Things I'm passionate about outside of work.</div>
        </div>
        <div class="menu-item">
            <a href="#">contact</a>
            <div class="popup">Get in touch — always open to new opportunities.</div>
        </div>
    </div>
    <div class="socials">
        <a href="https://www.instagram.com/lourt101?igsh=aTJmeDdqdmU2MHFj&utm_source=qr" target="_blank">instagram</a>
        <a href="https://open.spotify.com/user/psvd7bljlz388mt36t0lz5l6i?si=45927fe03a7547ab" target="_blank">spotify</a>
        <a href="https://github.com/purepurekaos" target="_blank">github</a>
    </div>
    <div class="time" id="clock"></div>
</div>
<script>
// Clock
function updateClock(){
    const now = new Date();
    document.getElementById('clock').textContent =
        now.toLocaleDateString() + " " +
        now.toLocaleTimeString() + " GMT";
}
updateClock();
setInterval(updateClock, 1000);

// Canvas setup
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Smooth noise using multiple sine layers
function smoothNoise(x, y, t){
    return (
        Math.sin(x * 0.08 + t * 0.25) * 0.4 +
        Math.sin(y * 0.1  + t * 0.2)  * 0.3 +
        Math.sin((x + y) * 0.06 + t * 0.15) * 0.2 +
        Math.sin((x - y) * 0.05 + t * 0.1)  * 0.1 +
        Math.sin(x * 0.15 + y * 0.07 + t * 0.18) * 0.15 +
        Math.sin(x * 0.04 + y * 0.13 + t * 0.12) * 0.1
    );
}

let t = 0;

function draw(){
    const w = canvas.width;
    const h = canvas.height;

    // Draw wave terrain as horizontal flow lines
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, w, h);

    const numLines = 120;
    const lineSpacing = h / numLines;

    for(let i = 0; i < numLines; i++){
        const baseY = i * lineSpacing;
        const depth = i / numLines; // 0 = top, 1 = bottom

        ctx.beginPath();
        for(let x = 0; x <= w; x += 3){
            const n = smoothNoise(x, i * 2, t);
            // Wave height increases slightly toward mid-screen
            const amplitude = lineSpacing * (1.2 + Math.sin(depth * Math.PI) * 1.5);
            const y = baseY + n * amplitude;
            x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }

        // Brightness: mid-waves slightly lighter, edges dark
        const brightness = Math.floor(18 + Math.sin(depth * Math.PI) * 28);
        ctx.strokeStyle = `rgb(${brightness},${brightness},${brightness})`;
        ctx.lineWidth = 1.2;
        ctx.stroke();
    }

    t += 0.003; // very slow
    requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
