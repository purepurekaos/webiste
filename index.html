<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TLR</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}
body{
    color:#fff;
    font-family: "Courier New", monospace;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    overflow:hidden;
}
canvas{
    position:fixed;
    top:0;
    left:0;
    z-index:0;
    will-change: transform;
}
.container{
    text-align:center;
    position:relative;
    z-index:1;
    will-change: transform;
}
.menu{
    text-align:center;
    display:inline-block;
}
.menu-item{
    margin:18px 0;
}
.menu-item a{
    display:block;
    color:white;
    text-decoration:none;
    font-size:14px;
    transition: opacity 0.2s ease;
}
.menu-item a:hover{
    opacity: 0.6;
}
.popup{
    max-height:0;
    overflow:hidden;
    transition: max-height 0.4s cubic-bezier(0.4,0,0.2,1), padding 0.4s cubic-bezier(0.4,0,0.2,1);
    font-size:12px;
    color:#aaa;
    text-align:center;
    padding:0;
    line-height:1.6;
}
.menu-item:hover .popup{
    max-height:100px;
    padding:8px 0;
}
.socials{
    margin-top:40px;
    text-align:center;
}
.socials a{
    color:#888;
    text-decoration:none;
    margin:0 8px;
    transition: color 0.2s ease;
}
.socials a:hover{
    color:#fff;
}
.time{
    font-size:13px;
    margin-top:40px;
    color:#888;
}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="container">
    <div class="menu">
        <div class="menu-item">
            <a href="#">about me</a>
            <div class="popup">A little bit about who I am and what I do.</div>
        </div>
        <div class="menu-item">
            <a href="#">Qualifications</a>
            <div class="popup">My education, certifications, and experience.</div>
        </div>
        <div class="menu-item">
            <a href="#">Interests</a>
            <div class="popup">Things I'm passionate about outside of work.</div>
        </div>
        <div class="menu-item">
            <a href="#">contact</a>
            <div class="popup">Get in touch — always open to new opportunities.</div>
        </div>
    </div>
    <div class="socials">
        <a href="https://www.instagram.com/lourt101?igsh=aTJmeDdqdmU2MHFj&utm_source=qr" target="_blank">instagram</a>
        <a href="https://open.spotify.com/user/psvd7bljlz388mt36t0lz5l6i?si=45927fe03a7547ab" target="_blank">spotify</a>
        <a href="https://github.com/purepurekaos" target="_blank">github</a>
    </div>
    <div class="time" id="clock"></div>
</div>
<script>
// Clock — runs independently
function updateClock(){
    const now = new Date();
    document.getElementById('clock').textContent =
        now.toLocaleDateString() + " " +
        now.toLocaleTimeString() + " GMT";
}
updateClock();
setInterval(updateClock, 1000);

// Canvas
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d', { alpha: false });

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Perlin noise
function fade(t){ return t*t*t*(t*(t*6-15)+10); }
function lerp(a,b,t){ return a+t*(b-a); }
function grad(hash,x,y){
    const h=hash&3;
    return ((h&1)?-(h<2?x:y):(h<2?x:y))+((h&2)?-(h<2?y:x):(h<2?y:x));
}
const p = new Uint8Array(256);
for(let i=0;i<256;i++) p[i]=i;
for(let i=255;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [p[i],p[j]]=[p[j],p[i]]; }
const perm = new Uint8Array(512);
for(let i=0;i<512;i++) perm[i]=p[i&255];

function perlin(x,y){
    const X=Math.floor(x)&255, Y=Math.floor(y)&255;
    x-=Math.floor(x); y-=Math.floor(y);
    const u=fade(x), v=fade(y);
    const a=perm[X]+Y, b=perm[X+1]+Y;
    return lerp(
        lerp(grad(perm[a],x,y),   grad(perm[b],x-1,y),   u),
        lerp(grad(perm[a+1],x,y-1),grad(perm[b+1],x-1,y-1),u),
        v
    );
}

function fbm(x,y,oct){
    let v=0,a=0.5,f=1,m=0;
    for(let i=0;i<oct;i++){
        v+=perlin(x*f,y*f)*a;
        m+=a; a*=0.5; f*=2;
    }
    return v/m;
}

// Offscreen canvas for double buffering
const offscreen = document.createElement('canvas');
const off = offscreen.getContext('2d', { alpha: false });

let t = 0;
let lastFrame = 0;

function draw(timestamp){
    // Throttle to ~30fps for the background — smooth enough, lighter on CPU
    if(timestamp - lastFrame < 33){
        requestAnimationFrame(draw);
        return;
    }
    lastFrame = timestamp;

    const w = canvas.width;
    const h = canvas.height;

    if(offscreen.width !== w || offscreen.height !== h){
        offscreen.width = w;
        offscreen.height = h;
    }

    off.fillStyle = '#000';
    off.fillRect(0, 0, w, h);

    const numLines = 140;
    for(let i = 0; i < numLines; i++){
        const baseY = (i / numLines) * h;
        const depth = i / numLines;

        off.beginPath();
        let first = true;
        for(let x = 0; x <= w; x += 4){
            const n = fbm(x/w*3 + t*0.07, i/numLines*3 + t*0.04, 4);
            const amp = (h/numLines) * (1.5 + Math.sin(depth*Math.PI)*3);
            const y = baseY + n * amp;
            if(first){ off.moveTo(x,y); first=false; }
            else off.lineTo(x,y);
        }
        const b = Math.floor(10 + Math.sin(depth*Math.PI)*32);
        off.strokeStyle = `rgb(${b},${b},${b})`;
        off.lineWidth = 1;
        off.stroke();
    }

    // Blit offscreen to main canvas in one go
    ctx.drawImage(offscreen, 0, 0);

    t += 0.0015;
    requestAnimationFrame(draw);
}

requestAnimationFrame(draw);
</script>
</body>
</html>
