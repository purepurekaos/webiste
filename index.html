<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TLR</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background:#fff;
    color:#000;
}

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 50px;
    border-bottom:1px solid #ddd;
}

.logo{
    background:#d00;
    color:white;
    font-weight:bold;
    padding:10px 20px;
    font-size:24px;
}

nav a{
    text-decoration:none;
    color:black;
    margin-left:25px;
    font-size:14px;
}

.hero{
    height:80vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.hero h1{
    font-size:4rem;
    margin-bottom:10px;
}

.hero p{
    font-size:1.2rem;
    color:#555;
}

.button{
    margin-top:25px;
    background:black;
    color:white;
    padding:12px 28px;
    text-decoration:none;
}

.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:50px;
}

.card{
    border:1px solid #eee;
}

.card img{
    width:100%;
    height:300px;
    object-fit:cover;
}

.card h3{
    padding:15px;
}

.card p{
    padding:0 15px 15px;
}

footer{
    text-align:center;
    padding:30px;
    border-top:1px solid #ddd;
}
</style>
</head>
<body>

<header>
    <div class="logo">TLR</div>

    <nav>
        <a href="#">Shop</a>
        <a href="#">Lookbook</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>
</header>

<section class="hero">
    <h1>SPRING DROP</h1>
    <p>New collection available now.</p>
    <a href="#" class="button">SHOP NOW</a>
</section>

<section class="products">
    <div class="card">
        <img src="https://picsum.photos/400/500?1">
        <h3>Graphic Tee</h3>
        <p>£35</p>
    </div>

    <div class="card">
        <img src="https://picsum.photos/400/500?2">
        <h3>Hoodie</h3>
        <p>£70</p>
    </div>

    <div class="card">
        <img src="https://picsum.photos/400/500?3">
        <h3>Cap</h3>
        <p>£25</p>
    </div>
</section>

<footer>
    © 2026 TLR
</footer>

</body>
</html>
